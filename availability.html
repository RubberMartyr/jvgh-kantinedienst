<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JVGH – Beschikbaarheid</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .availability-wrap {
      max-width: 900px;
      margin: 20px auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    .availability-meta {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #374151;
    }

    .availability-month {
      font-size: 30px;
      line-height: 1.1;
      font-weight: 700;
      color: #1f2937;
    }

    .availability-month small {
      font-size: 18px;
      font-weight: 500;
      color: #4b5563;
    }

    .availability-month-nav {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .availability-month-btn {
      border: 1px solid #0f172a;
      background: #0f172a;
      color: #fff;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .availability-month-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .availability-status {
      margin: 10px 0 14px;
      color: #4b5563;
      font-size: 14px;
    }

    .availability-save-wrap {
      display: flex;
      justify-content: center;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    .availability-save-btn {
      min-width: 280px;
      min-height: 56px;
      font-size: 30px;
      font-weight: 800;
      border-radius: 12px;
      border: 0;
      background: #0f3467;
      color: #fff;
      cursor: pointer;
      padding: 10px 24px;
    }

    .availability-save-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .availability-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .availability-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      border: 1px solid #f3f4f6;
      border-left: 5px solid #dc2626;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff7f7;
    }

    .availability-item-empty {
      border-left-color: #dc2626;
      background: #fff7f7;
    }

    .availability-item-partial {
      border-left-color: #f59e0b;
      background: #fffaf0;
    }

    .availability-item-full {
      border-left-color: #16a34a;
      background: #f0fdf4;
    }

    .availability-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .availability-item-main {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    .availability-expand-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #1e3a8a;
      border-radius: 999px;
      width: 26px;
      height: 26px;
      font-weight: 700;
      cursor: pointer;
    }

    .availability-details {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #fff;
      border: 1px dashed #d1d5db;
      font-size: 13px;
      color: #374151;
      display: none;
    }

    .availability-details.is-open {
      display: block;
    }

    .availability-details ul {
      margin: 6px 0 0 18px;
      padding: 0;
    }

    .availability-error {
      color: #b91c1c;
      font-weight: 600;
    }
  </style>
</head>
<body>
<header class="jvgh-header">
  <div class="jvgh-header-left">
    <img
      src="https://goldbug.be/wp-content/uploads/2024/11/cropped-logo-klein-zwart-2.png"
      alt="JVGH logo"
      class="jvgh-logo"
    />
    <div class="jvgh-header-text">
      <div class="jvgh-header-title">JVGH – Beschikbaarheid</div>
      <div class="jvgh-header-subtitle">
        Vink shifts aan om de gebruiker automatisch in te plannen.
      </div>
    </div>
  </div>
  <div class="jvgh-header-tag">Intern clubgebruik</div>
</header>

<main class="jvgh-main">
  <section class="availability-wrap">
    <div class="availability-meta" id="availability-meta"></div>
    <div class="availability-status" id="availability-status">Laden…</div>
    <ul id="availability-list" class="availability-list"></ul>
    <div class="availability-save-wrap">
      <button id="availability-save" class="availability-save-btn" disabled>Alles opgeslagen</button>
    </div>
  </section>
</main>

<script src="jvgh-api.js"></script>
<script src="availability.js"></script>
</body>
</html>
