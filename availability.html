<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JVGH – Beschikbaarheid</title>
  <link rel="stylesheet" href="./styles.css" />
  <script>
    (function () {
      const storageKey = "jvgh_access_granted";
      let saved = null;

      try {
        saved = JSON.parse(localStorage.getItem(storageKey) || "null");
      } catch (err) {
        localStorage.removeItem(storageKey);
      }

      if (saved && saved.granted && saved.expires > Date.now()) {
        return;
      }

      if (saved) {
        localStorage.removeItem(storageKey);
      }

      document.documentElement.classList.add("jvgh-access-locked");
    })();
  </script>
  <style>
    .availability-wrap {
      max-width: 900px;
      margin: 20px auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    .availability-meta {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #374151;
    }

    .availability-month {
      font-size: 30px;
      line-height: 1.1;
      font-weight: 700;
      color: #1f2937;
    }

    .availability-month small {
      font-size: 18px;
      font-weight: 500;
      color: #4b5563;
    }

    .availability-month-nav {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .availability-month-btn {
      border: 1px solid #0f172a;
      background: #0f172a;
      color: #fff;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .availability-month-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .availability-status {
      margin: 10px 0 14px;
      color: #4b5563;
      font-size: 22px;
      font-weight: 600;
    }

    .availability-month-unavailable {
      margin: 0 0 14px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #f9fafb;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
    }

    .availability-month-unavailable input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .availability-save-wrap {
      display: flex;
      justify-content: stretch;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    .availability-actions-wrap {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    .availability-actions-wrap.hidden {
      display: none;
    }

    .availability-save-wrap.hidden {
      display: none;
    }

    .availability-calendar-btn {
      min-height: 56px;
      font-size: 20px;
      font-weight: 800;
      border-radius: 12px;
      border: 2px solid #14532d;
      background: #15803d;
      color: #fff;
      cursor: pointer;
      padding: 10px 20px;
      box-shadow: 0 4px 10px rgba(21, 128, 61, 0.3);
      transition: transform 0.08s ease, box-shadow 0.12s ease;
    }

    .availability-calendar-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(21, 128, 61, 0.4);
    }

    .availability-calendar-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .availability-save-btn {
      flex: 1;
      min-height: 56px;
      font-size: 28px;
      font-weight: 800;
      border-radius: 12px;
      border: 2px solid #0a2749;
      background: #0f3467;
      color: #fff;
      cursor: pointer;
      padding: 10px 24px;
      box-shadow: 0 4px 10px rgba(15, 52, 103, 0.35);
      transition: transform 0.08s ease, box-shadow 0.12s ease;
    }

    .availability-save-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15, 52, 103, 0.45);
    }

    .availability-save-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .availability-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .availability-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      border: 1px solid #f3f4f6;
      border-left: 5px solid #dc2626;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff7f7;
    }

    .availability-item-empty {
      border-left-color: #dc2626;
      background: #fff7f7;
    }

    .availability-item-partial {
      border-left-color: #f59e0b;
      background: #fffaf0;
    }

    .availability-item-full {
      border-left-color: #16a34a;
      background: #f0fdf4;
    }

    .availability-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .availability-item-main {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    .availability-type-match {
      border-left: 4px solid #28a745;
    }

    .availability-type-event {
      border-left: 4px solid #ff8c00;
    }

    .availability-type-rental {
      border-left: 4px solid #007bff;
    }

    .availability-type-board {
      border-left: 4px solid #800080;
    }

    .availability-source-badge {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.12);
    }

    .availability-expand-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #1e3a8a;
      border-radius: 999px;
      width: 26px;
      height: 26px;
      font-weight: 700;
      cursor: pointer;
    }

    .availability-details {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #fff;
      border: 1px dashed #d1d5db;
      font-size: 13px;
      color: #374151;
      display: none;
    }

    .availability-details.is-open {
      display: block;
    }

    .availability-details ul {
      margin: 6px 0 0 18px;
      padding: 0;
    }

    .availability-error {
      color: #b91c1c;
      font-weight: 600;
    }

    #availability-save-toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: #28a745;
      color: white;
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 15px;
      box-shadow:
        0 10px 30px rgba(0,0,0,0.25);
      opacity: 0;
      pointer-events: none;
      z-index: 999999;
      transition:
        opacity 0.25s ease,
        transform 0.25s ease;
      max-width: calc(100vw - 32px);
      text-align: center;
    }

    #availability-save-toast.is-visible {
      opacity: 1;
      transform:
        translateX(-50%)
        translateY(0);
    }

    #availability-save-toast.is-error {
      background: #dc3545;
    }


    html.jvgh-access-locked,
    html.jvgh-access-locked body {
      overflow: hidden;
    }

    html.jvgh-access-locked .jvgh-header,
    html.jvgh-access-locked .jvgh-main {
      pointer-events: none;
      user-select: none;
    }

    .jvgh-access-overlay {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 0.28s ease;
    }

    .jvgh-access-overlay.is-visible {
      opacity: 1;
    }

    .jvgh-access-overlay.is-leaving {
      opacity: 0;
      pointer-events: none;
    }

    .jvgh-access-card {
      width: min(420px, 90vw);
      border-radius: 18px;
      background: white;
      padding: 34px 30px 30px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.35), 0 8px 24px rgba(15, 23, 42, 0.22);
      transform: translateY(20px);
      transition: transform 0.28s ease;
    }

    .jvgh-access-overlay.is-visible .jvgh-access-card {
      transform: translateY(0);
    }

    .jvgh-access-logo {
      width: 86px;
      height: auto;
      margin-bottom: 18px;
    }

    .jvgh-access-title {
      margin: 0;
      color: #0f172a;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 800;
    }

    .jvgh-access-subtitle {
      margin: 8px 0 22px;
      color: #4b5563;
      font-size: 16px;
      font-weight: 600;
    }

    .jvgh-access-input {
      width: 100%;
      height: 52px;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 18px;
      text-align: center;
      letter-spacing: 3px;
      color: #111827;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .jvgh-access-input:focus {
      border-color: #15803d;
      box-shadow: 0 0 0 4px rgba(21, 128, 61, 0.14);
    }

    .jvgh-access-button {
      width: 100%;
      min-height: 56px;
      margin-top: 14px;
      font-size: 20px;
      font-weight: 800;
      border-radius: 12px;
      border: 2px solid #14532d;
      background: #15803d;
      color: #fff;
      cursor: pointer;
      padding: 10px 20px;
      box-shadow: 0 4px 10px rgba(21, 128, 61, 0.3);
      transition: transform 0.08s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .jvgh-access-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(21, 128, 61, 0.4);
    }

    .jvgh-access-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .jvgh-access-error {
      min-height: 20px;
      margin-top: 12px;
      color: #b91c1c;
      font-size: 14px;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      #availability-save-toast {
        width: calc(100vw - 24px);
        bottom: 16px;
        font-size: 14px;
        padding: 13px 16px;
      }
    }
  </style>
</head>
<body>
<header class="jvgh-header">
  <div class="jvgh-header-left">
    <img
      src="https://goldbug.be/wp-content/uploads/2024/11/cropped-logo-klein-zwart-2.png"
      alt="JVGH logo"
      class="jvgh-logo"
    />
    <div class="jvgh-header-text">
      <div class="jvgh-header-title">JVGH – Beschikbaarheid</div>
      <div class="jvgh-header-subtitle">
        Vink shifts aan om de gebruiker automatisch in te plannen.
      </div>
    </div>
  </div>
  <div class="jvgh-header-tag">Intern clubgebruik</div>
</header>

<main class="jvgh-main">
  <section class="availability-wrap">
    <div class="availability-meta" id="availability-meta"></div>
    <div class="availability-status" id="availability-status">Laden…</div>
    <label class="availability-month-unavailable" for="availability-month-unavailable-checkbox">
      <input type="checkbox" id="availability-month-unavailable-checkbox" />
      Ik ben niet beschikbaar deze maand
    </label>
    <div class="availability-actions-wrap hidden">
      <button id="availability-add-calendar" class="availability-calendar-btn">Add to calendar</button>
    </div>
    <div class="availability-save-wrap hidden">
      <button id="availability-save-top" class="availability-save-btn" disabled>Opslaan</button>
    </div>
    <ul id="availability-list" class="availability-list"></ul>
    <div class="availability-save-wrap hidden">
      <button id="availability-save-bottom" class="availability-save-btn" disabled>Opslaan</button>
    </div>
  </section>
</main>

<script src="jvgh-api.js"></script>
<script>
  (function () {
    const storageKey = "jvgh_access_granted";

    if (!document.documentElement.classList.contains("jvgh-access-locked")) {
      return;
    }

    const overlay = document.createElement("div");
    overlay.className = "jvgh-access-overlay";
    overlay.setAttribute("role", "dialog");
    overlay.setAttribute("aria-modal", "true");
    overlay.setAttribute("aria-labelledby", "jvgh-access-title");
    overlay.innerHTML = `
      <div class="jvgh-access-card">
        <img
          src="https://goldbug.be/wp-content/uploads/2024/11/cropped-logo-klein-zwart-2.png"
          alt="JVGH logo"
          class="jvgh-access-logo"
        />
        <h1 class="jvgh-access-title" id="jvgh-access-title">Kantinedienst Planning</h1>
        <p class="jvgh-access-subtitle">Voer de toegangscode in</p>
        <input
          class="jvgh-access-input"
          type="password"
          inputmode="numeric"
          autocomplete="current-password"
          aria-label="Toegangscode"
        />
        <button class="jvgh-access-button" type="button">Toegang verkrijgen</button>
        <div class="jvgh-access-error" aria-live="polite"></div>
      </div>
    `;

    document.body.appendChild(overlay);

    const input = overlay.querySelector(".jvgh-access-input");
    const button = overlay.querySelector(".jvgh-access-button");
    const error = overlay.querySelector(".jvgh-access-error");
    const defaultButtonText = button.textContent;

    requestAnimationFrame(() => {
      overlay.classList.add("is-visible");
      input.focus();
    });

    function setLoading(isLoading) {
      input.disabled = isLoading;
      button.disabled = isLoading;
      button.textContent = isLoading ? "Controleren..." : defaultButtonText;
    }

    function showError(message) {
      error.textContent = message;
      input.focus();
      input.select();
    }

    function unlockPage() {
      localStorage.setItem(
        storageKey,
        JSON.stringify({
          granted: true,
          expires:
            Date.now() +
            (30 * 24 * 60 * 60 * 1000)
        })
      );

      document.documentElement.classList.remove("jvgh-access-locked");
      overlay.classList.add("is-leaving");
      overlay.addEventListener("transitionend", () => overlay.remove(), { once: true });
    }

    async function verifyAccessCode() {
      const code = input.value.trim();

      if (!code) {
        showError("Onjuiste toegangscode");
        return;
      }

      error.textContent = "";
      setLoading(true);

      try {
        const response = await jvghRequest("/verify-access-code", {
          method: "POST",
          body: { code }
        });

        if (response && response.success === true) {
          unlockPage();
          return;
        }

        showError("Onjuiste toegangscode");
      } catch (err) {
        showError("Onjuiste toegangscode");
      } finally {
        if (document.body.contains(overlay)) {
          setLoading(false);
        }
      }
    }

    button.addEventListener("click", verifyAccessCode);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        verifyAccessCode();
      }
    });
  })();
</script>
<script src="availability.js"></script>
</body>
</html>
