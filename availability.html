<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JVGH – Beschikbaarheid</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .availability-wrap {
      max-width: 900px;
      margin: 20px auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    .availability-meta {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #374151;
    }

    .availability-status {
      margin: 10px 0 14px;
      color: #4b5563;
      font-size: 14px;
    }

    .availability-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .availability-item {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #f3f4f6;
      border-left: 5px solid #dc2626;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff7f7;
    }

    .availability-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .availability-item-main {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 14px;
    }

    .availability-badge {
      background: #111827;
      color: #fff;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
    }

    .availability-error {
      color: #b91c1c;
      font-weight: 600;
    }
  </style>
</head>
<body>
<header class="jvgh-header">
  <div class="jvgh-header-left">
    <img
      src="https://goldbug.be/wp-content/uploads/2024/11/cropped-logo-klein-zwart-2.png"
      alt="JVGH logo"
      class="jvgh-logo"
    />
    <div class="jvgh-header-text">
      <div class="jvgh-header-title">JVGH – Beschikbaarheid</div>
      <div class="jvgh-header-subtitle">
        Vink shifts aan om de gebruiker automatisch in te plannen.
      </div>
    </div>
  </div>
  <div class="jvgh-header-tag">Intern clubgebruik</div>
</header>

<main class="jvgh-main">
  <section class="availability-wrap">
    <div class="availability-meta" id="availability-meta"></div>
    <div class="availability-status" id="availability-status">Laden…</div>
    <div style="margin-bottom: 12px;">
      <button id="availability-save" class="jvgh-print-btn" disabled>Alles opgeslagen</button>
    </div>
    <ul id="availability-list" class="availability-list"></ul>
  </section>
</main>

<script src="jvgh-api.js"></script>
<script src="availability.js"></script>
</body>
</html>
